version: 3

vars:
  BIN: apigear{{exeExt}}
  # Pinned apigear CLI version this template is certified against.
  # Bump after a generation+test pass on the new version.
  APIGEAR_VERSION: v0.50.2
tasks:
  install:
    cmds:
      - go install github.com/apigear-io/cli/cmd/apigear@{{.APIGEAR_VERSION}}
      - pip install black
      # - rm -rf tmp bin
      # - mkdir tmp bin
      # - gh release download --repo apigear-io/cli --pattern "apigear_{{OS}}_{{ARCH}}.zip" --dir tmp
      # - unzip tmp/apigear_{{OS}}_{{ARCH}}.zip -d bin
  clean:
    cmds:
      - cmd: powershell Remove-Item -Recurse -Force test
        platforms: [windows]
        ignore_error: true
      - cmd: rm -rf test bin tmp
        platforms: [linux, darwin]
        ignore_error: true
  generate_solution:
    cmds:
      - task: clean
      - "{{.BIN}} g s ./apigear/goldenmaster.solution.yaml"

  py:install_goldenmaster:
    desc: install the dependencies
    dir: goldenmaster
    cmds:
      - pip install -r requirements.txt
      # Install library for extern type used in goldenmaster
      - pip install vector3d
  py:install_generated:
    desc: install the dependencies
    dir: test
    cmds:
      - pip install -r requirements.txt
      # Install library for extern type used in test
      - pip install vector3d
  py:test_goldenmaster:
    desc: runs pytest in goldenmaster dir
    dir: goldenmaster
    cmds:
      - pytest
  py:test_generated:
    desc: runs pytest in test dir
    dir: test
    cmds:
      - pytest
  diff:
    cmds:
      - git --no-pager diff --no-index ./goldenmaster ./test
  format:
    dir: test
    cmds:
      - black .
  ci:
    desc: runs the local ci pipeline (mirrors what GitHub Actions does)
    cmds:
      - task: install
      - task: generate_solution
      - task: diff
      - task: py:install_goldenmaster
      - task: py:test_goldenmaster
      - task: py:install_generated
      - task: py:test_generated
